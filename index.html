<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERDITO BANK</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/cerdito.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/379028bca9.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="src/loader/Loader.css">
</head>

<body>

    <div id="loader">
    <div class="loader-content">
        <img src="images/cerdito.gif" alt="Cargando">
        <h2>Cargando...</h2>
    </div>
</div>

    <main class="container">

        <section class="center_container">

            <div class="logo_container">

                <img src="images/cerdito.png" alt="Logo Cerdito Bank">

                <h1>Cerdito Bank</h1>

                <p>
                    Tu banca digital nunca fue tan simple,

                </p>

            </div>

            <a href="src/registro/Registro.html" class="learn-more">

                <span class="circle">
                    <span class="icon arrow"></span>
                </span>

                <span class="button-text">
                    Comenzar
                </span>

            </a>

            <div class="social_container">

                <a href="#" aria-label="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>

                <a href="#" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>

                <a href="#" aria-label="Twitter">
                    <i class="fa-brands fa-x-twitter"></i>

            </div>
