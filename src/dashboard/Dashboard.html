<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | Cerdito Bank</title>

    <link rel="stylesheet" href="Dashboard.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="brand">

                <i class="fa-solid fa-piggy-bank"></i>

                <h2>Cerdito Bank</h2>

            </div>

            <nav class="menu">

                <a href="#" class="active">
                    <i class="fa-solid fa-house"></i>
                    Inicio
                </a>

                <a href="#">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    Transferencias
                </a>

                <a href="#">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    Movimientos
                </a>

                <a href="#">
                    <i class="fa-solid fa-user"></i>
                    Mi Perfil
                </a>

            </nav>

            <button id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i>
                Cerrar Sesión
            </button>

        </aside>

        <!-- CONTENIDO -->

        <main class="content">

            <header class="topbar">

                <div>
                    <h1 id="welcomeMessage">
                        Bienvenido
                    </h1>

                    <p>
                        Gestiona tu dinero de forma simple y segura.
                    </p>
                </div>

            </header>

            <!-- RESUMEN -->

            <section class="top-section">

                <div class="balance-card">

                    <span class="card-label">
                        Saldo Disponible
                    </span>

                    <h2 id="saldo">
                        $10.000
                    </h2>

                    <div class="bank-data">

                        <div>
                            <small>CVU</small>
                            <span id="cvu"></span>
                        </div>

                        <div>
                            <small>CBU</small>
                            <span id="cbu"></span>
                        </div>

                    </div>

                </div>

                <div class="actions-card">

                    <button>
                        <i class="fa-solid fa-money-bill-transfer"></i>
                        Transferir
                    </button>

                    <button>
                        <i class="fa-solid fa-building-columns"></i>
                        Ver Datos Bancarios
                    </button>

                    <button>
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        Movimientos
                    </button>

                </div>

            </section>

            <!-- TRANSFERENCIA -->

            <section class="transfer-card">

                <h2>
                    Transferir Dinero
                </h2>

                <form id="transferForm">

                    <input
                        type="text"
                        id="cvuDestino"
                        placeholder="CVU del destinatario"
                        required>

                    <input
                        type="number"
                        id="monto"
                        placeholder="Monto a transferir"
                        min="1"
                        required>

                    <button type="submit">
                        Enviar Dinero
                    </button>

                </form>

            </section>

            <!-- MOVIMIENTOS -->

            <section class="movements-card">

                <h2>
                    Últimos Movimientos
                </h2>

                <ul id="movimientos">

                    <li>
                        <span>Saldo inicial acreditado</span>
                        <span class="ingreso">
                            +$10.000
                        </span>
                    </li>

                </ul>

            </section>

        </main>

    </div>

    <script src="Dashboard.js"></script>

</body>

</html>
