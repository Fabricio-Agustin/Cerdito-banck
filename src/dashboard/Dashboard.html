<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Dashboard | Cerdito Bank</title>

    <link rel="stylesheet" href="Dashboard.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

</head>

<body>

    <main class="dashboard">

        <header class="header">

            <div>

                <h1 id="welcomeMessage">
                    Bienvenido
                </h1>

                <p>
                    Tu banca digital personal
                </p>

            </div>

            <button id="logoutBtn">

                <i class="fa-solid fa-right-from-bracket"></i>

            </button>

        </header>

        <section class="account-card">

            <div>

                <span class="label">
                    Saldo Disponible
                </span>

                <h2 id="saldo">
                    $0
                </h2>

            </div>

            <div class="account-info">

                <div>

                    <small>CVU</small>

                    <p id="cvu"></p>

                </div>

            </div>

        </section>

        <section class="actions">

            <button id="showTransfer">

                <i class="fa-solid fa-paper-plane"></i>

                Transferir

            </button>

            <button id="showUsers">

                <i class="fa-solid fa-users"></i>

                Usuarios

            </button>

            <button id="showMovements">

                <i class="fa-solid fa-clock-rotate-left"></i>

                Historial

            </button>

        </section>

        <section
            id="transferSection"
            class="panel">

            <h3>
                Transferir dinero
            </h3>

            <form id="transferForm">

                <select
                    id="userSelect"
                    required>

                    <option value="">
                        Seleccionar usuario
                    </option>

                </select>

                <input
                    type="number"
                    id="monto"
                    placeholder="Monto"
                    min="1"
                    required>

                <button type="submit">
                    Enviar dinero
                </button>

            </form>

        </section>

        <section
            id="usersSection"
            class="panel hidden">

            <h3>
                Usuarios registrados
            </h3>

            <ul id="usersList"></ul>

        </section>

        <section
            id="movementsSection"
            class="panel hidden">

            <h3>
                Historial de movimientos
            </h3>

            <ul id="movimientos"></ul>

        </section>

    </main>

    <script
        type="module"
        src="Dashboard.js">
    </script>

</body>

</html>
