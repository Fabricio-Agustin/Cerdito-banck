<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro | Cerdito Bank</title>
<!-- Loader -->
<link rel="stylesheet" href="../loader/Loader.css">
<!-- Estilos Registro -->
<link rel="stylesheet" href="Registro.css">
<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">


</head>

<body>

<!-- LOADER -->
<div id="loader">

    <div class="loader-content">

        <img src="../../images/cerdito.gif" alt="Cargando">

        <h2>Cargando...</h2>

    </div>

</div>

<!-- CONTENIDO -->
<main class="container">

    <!-- IMAGEN IZQUIERDA -->
    <section class="image-section">

        <img src="../../images/cry-pig.png" alt="Cerdito Bank">

    </section>

    <!-- FORMULARIO DERECHA -->
    <section class="form-section">

        <div class="form-container">

            <h1>Crear Cuenta</h1>

            <p>
                Comienza a gestionar tu dinero de forma simple,
                rápida y segura.
            </p>

            <form action="#" method="post">

                <div class="input-group">
                    <label for="nombre">Nombre</label>
                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Ingresa tu nombre"
                        required>
                </div>

                <div class="input-group">
                    <label for="apellido">Apellido</label>
                    <input
                        type="text"
                        id="apellido"
                        name="apellido"
                        placeholder="Ingresa tu apellido"
                        required>
                </div>

                <div class="input-group">
                    <label for="usuario">Usuario</label>
                    <input
                        type="text"
                        id="usuario"
                        name="usuario"
                        placeholder="Ingresa tu usuario"
                        required>
                </div>

                <div class="input-group">
                    <label for="correo">Correo electrónico</label>
                    <input
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="correo@ejemplo.com"
                        required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="********"
                        required>
                </div>

                <button type="submit">
                    Registrarme
                </button>

            </form>

            <div class="login-link">

                <p>
                    ¿Ya tienes una cuenta?
                    <a href="../login/Login.html">
                        Inicia sesión
                    </a>
                </p>

            </div>

            <a href="../../index.html" class="back-link">
                ← Volver al inicio
            </a>

        </div>

    </section>

</main>

<!-- Etiquetas de javascript -->
<script src="../loader/Loader.js"></script>
<script type="module" src="../logic/register.js"></script>

</body>

</html>
