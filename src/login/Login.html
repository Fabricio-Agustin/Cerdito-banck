<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión | Cerdito Bank</title>
<!-- Loader -->
<link rel="stylesheet" href="../loader/Loader.css">
<!-- CSS -->
<link rel="stylesheet" href="Login.css">
<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body>

<div id="loader">

    <div class="loader-content">

        <img src="../../images/cerdito.gif" alt="Cargando">

        <h2>Cargando...</h2>

    </div>

</div>

<!-- CONTENIDO -->
<main class="container">

    <!-- IMAGEN -->
    <section class="image-section">

        <img src="../../images/cerdito.png" alt="Cerdito Bank">

    </section>

    <!-- LOGIN -->
    <section class="form-section">

        <div class="form-container">

            <h1>Iniciar Sesión</h1>

            <p>
                Accede a tu cuenta y administra tus finanzas
                de forma rápida y segura.
            </p>

            <form>

                <div class="input-group">
                    <label for="usuario">
                        Usuario
                    </label>

                    <input
                        type="text"
                        id="usuario"
                        placeholder="Ingresa tu usuario"
                        required>
                </div>

                <div class="input-group">
                    <label for="password">
                        Contraseña
                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="********"
                        required>
                </div>

                <button type="submit">
                    Ingresar
                </button>

            </form>

            <div class="login-link">

                <p>
                    ¿No tienes una cuenta?
                    <a href="../registro/Registro.html">
                        Regístrate
                    </a>
                </p>

            </div>

            <a href="../../index.html" class="back-link">
                ← Volver al inicio
            </a>

        </div>

    </section>

</main>

<script src="../loader/Loader.js"></script>
<script type="module" src="../logic/login.js"></script>

</body>

</html>
